name: CI Pipeline
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
      - run: cargo build
      - name: Validate Docker
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
